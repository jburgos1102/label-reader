<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Reader POC</title>
    <style>
        :root {
            --page: #252322;
            --panel: #1a1515;
            --row: #2d2928;
            --row-border: #5e6061;
            --text: #f3eeee;
            --muted: #b8b0b0;
            --accent: #0093d1;
            --accent-hover: #00a4e8;
            --danger: #ff6b6b;
            --code: #0f0b0c;
            --green: #4caf50;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--page);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .app {
            width: min(100%, 1100px);
            min-height: 100vh;
            padding: 24px clamp(16px, 4vw, 60px) 48px;
        }

        h1 {
            margin: 0 0 24px;
            font-size: clamp(26px, 5vw, 40px);
            font-weight: 700;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 20px;
            font-weight: 700;
        }

        /* ── Two-column layout ── */
        .scanner-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            padding: clamp(18px, 3vw, 32px);
            border: 1px solid var(--row-border);
            background: var(--panel);
        }

        /* ── Camera panel ── */
        .field-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--muted);
        }

        select {
            width: 100%;
            margin-bottom: 14px;
            padding: 8px 10px;
            border: 1px solid var(--row-border);
            border-radius: 5px;
            background: var(--row);
            color: var(--text);
            font-size: 14px;
        }

        #camera-preview {
            display: block;
            width: 100%;
            min-height: 240px;
            max-height: 400px;
            object-fit: cover;
            background: #000;
            margin-bottom: 10px;
        }

        .camera-status {
            margin: 0 0 10px;
            font-size: 13px;
            color: var(--muted);
            min-height: 1.4em;
        }

        .barcode-status {
            margin: 0 0 14px;
            font-size: 13px;
            color: var(--muted);
            min-height: 1.4em;
        }

        .barcode-found {
            color: var(--green);
            font-weight: 600;
        }

        /* ── Camera button row ── */
        .camera-btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ── Upload row ── */
        .upload-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 10px;
            background: var(--row);
            border: 1px solid var(--row-border);
        }

        input[type="file"] {
            width: 100%;
            color: var(--muted);
            font-size: 13px;
        }

        input[type="file"]::file-selector-button {
            margin-right: 10px;
            padding: 7px 12px;
            border: 0;
            border-radius: 4px;
            background: #efefef;
            color: #171313;
            font: inherit;
            cursor: pointer;
        }

        /* ── Buttons ── */
        button {
            min-width: 118px;
            min-height: 38px;
            padding: 0 20px;
            border: 0;
            border-radius: 7px;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
        }

        button:hover,
        button:focus-visible { background: var(--accent-hover); }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.secondary {
            background: var(--row);
            border: 1px solid var(--row-border);
        }

        button.secondary:hover,
        button.secondary:focus-visible { background: #3a3535; }

        /* ── Results panel ── */
        .results-panel { min-height: 300px; }

        .helper-text {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .error-msg {
            margin: 0 0 12px;
            color: var(--danger);
            font-weight: 700;
            font-size: 14px;
        }

        pre {
            min-height: 200px;
            max-height: 600px;
            margin: 0;
            padding: 16px;
            overflow: auto;
            border: 1px solid var(--row-border);
            background: var(--code);
            color: #e8f7ff;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* ── Annotation panel ── */
        .annotate-panel {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--row-border);
        }

        .annotate-panel h3 {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 700;
        }

        .annotate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            margin-bottom: 14px;
        }

        .annotate-field label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .annotate-field input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--row-border);
            border-radius: 5px;
            background: var(--row);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
        }

        .annotate-field input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .annotate-status {
            margin: 8px 0 0;
            font-size: 13px;
            min-height: 1.4em;
        }

        .annotate-status.ok  { color: var(--green); }
        .annotate-status.err { color: var(--danger); }

        /* ── Mobile: stack columns ── */
        @media (max-width: 680px) {
            .scanner-layout { grid-template-columns: 1fr; }
            .upload-row { grid-template-columns: 1fr; }
            button { width: 100%; }
            .camera-btn-row { flex-direction: column; }
            .annotate-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="app">
        <h1>Label Reader POC</h1>

        <div class="scanner-layout">

            <!-- ── LEFT: camera + file upload ── -->
            <div class="left-col">

                <section class="panel" aria-labelledby="cam-title">
                    <h2 id="cam-title">Camera Scan</h2>

                    <label for="camera-source" class="field-label">Camera Source</label>
                    <select id="camera-source">
                        <option value="">Detecting cameras…</option>
                    </select>

                    <video id="camera-preview" autoplay playsinline></video>

                    <p id="barcode-status" class="barcode-status"></p>
                    <p id="camera-status" class="camera-status">Connecting to camera…</p>

                    <div class="camera-btn-row">
                        <button type="button" id="capture-btn" disabled>Capture &amp; Scan</button>
                        <button type="button" id="toggle-camera-btn" class="secondary">Stop Camera</button>
                    </div>
                </section>

                <section class="panel" aria-labelledby="upload-title">
                    <h2 id="upload-title">Upload Image</h2>
                    <div class="upload-row">
                        <input type="file" id="file-input" accept="image/*">
                        <button type="button" id="upload-btn">Upload</button>
                    </div>
                </section>

            </div>

            <!-- ── RIGHT: results ── -->
            <section class="panel results-panel" aria-labelledby="results-title">
                <h2 id="results-title">Results</h2>
                <p id="results-placeholder" class="helper-text">
                    Capture a label or upload an image to see results here.
                </p>
                <p id="results-error" class="error-msg" hidden></p>
                <pre id="results-output" hidden></pre>

                <div id="annotate-panel" class="annotate-panel" hidden>
                    <h3>Annotate</h3>
                    <div class="annotate-grid">
                        <div class="annotate-field">
                            <label for="ann-recipient-name">Recipient Name</label>
                            <input type="text" id="ann-recipient-name" name="recipient_name">
                        </div>
                        <div class="annotate-field">
                            <label for="ann-street-address">Street Address</label>
                            <input type="text" id="ann-street-address" name="street_address">
                        </div>
                        <div class="annotate-field">
                            <label for="ann-city">City</label>
                            <input type="text" id="ann-city" name="city">
                        </div>
                        <div class="annotate-field">
                            <label for="ann-state">State</label>
                            <input type="text" id="ann-state" name="state">
                        </div>
                        <div class="annotate-field">
                            <label for="ann-zip-code">ZIP Code</label>
                            <input type="text" id="ann-zip-code" name="zip_code">
                        </div>
                        <div class="annotate-field">
                            <label for="ann-tracking-number">Tracking Number</label>
                            <input type="text" id="ann-tracking-number" name="tracking_number">
                        </div>
                        <div class="annotate-field">
                            <label for="ann-carrier">Carrier</label>
                            <input type="text" id="ann-carrier" name="carrier">
                        </div>
                    </div>
                    <button type="button" id="annotate-btn">Save Annotation</button>
                    <p id="annotate-status" class="annotate-status"></p>
                </div>
            </section>

        </div>
    </main>

    <canvas id="camera-canvas" hidden></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script>
    (function () {
        var video            = document.getElementById('camera-preview');
        var canvas           = document.getElementById('camera-canvas');
        var captureBtn       = document.getElementById('capture-btn');
        var toggleCameraBtn  = document.getElementById('toggle-camera-btn');
        var camSelect        = document.getElementById('camera-source');
        var statusEl         = document.getElementById('camera-status');
        var barcodeStatusEl  = document.getElementById('barcode-status');
        var fileInput        = document.getElementById('file-input');
        var uploadBtn        = document.getElementById('upload-btn');
        var placeholder      = document.getElementById('results-placeholder');
        var errEl            = document.getElementById('results-error');
        var outputEl         = document.getElementById('results-output');
        var stream              = null;
        var cameraActive        = false;
        var detector            = null;
        var scannerMode         = null;   // "native" | "quagga" | null
        var quaggaDetectTimeout = null;
        var _quaggaCanvas       = document.createElement('canvas');
        var currentLabelId      = null;

        var annotatePanel  = document.getElementById('annotate-panel');
        var annotateBtn    = document.getElementById('annotate-btn');
        var annotateStatus = document.getElementById('annotate-status');

        var _annotateInputs = {
            recipient_name:  document.getElementById('ann-recipient-name'),
            street_address:  document.getElementById('ann-street-address'),
            city:            document.getElementById('ann-city'),
            state:           document.getElementById('ann-state'),
            zip_code:        document.getElementById('ann-zip-code'),
            tracking_number: document.getElementById('ann-tracking-number'),
            carrier:         document.getElementById('ann-carrier'),
        };

        /* ── Results helpers ── */
        function showResults(data) {
            placeholder.hidden = true;
            errEl.hidden = true;
            outputEl.textContent = JSON.stringify(data, null, 4);
            outputEl.hidden = false;

            currentLabelId = data.label_id || null;
            if (currentLabelId && data.extracted) {
                var ex = data.extracted;
                Object.keys(_annotateInputs).forEach(function (field) {
                    _annotateInputs[field].value =
                        (ex[field] && ex[field].value != null) ? ex[field].value : '';
                });
                annotateStatus.textContent = '';
                annotateStatus.className = 'annotate-status';
                annotatePanel.hidden = false;
            } else {
                annotatePanel.hidden = true;
            }
        }

        function showError(msg) {
            placeholder.hidden = true;
            outputEl.hidden = true;
            errEl.textContent = msg;
            errEl.hidden = false;
            currentLabelId = null;
            annotatePanel.hidden = true;
        }

        /* ── POST image to /api/scan ── */
        function postImage(blob, filename) {
            var fd = new FormData();
            fd.append('label_image', blob, filename);
            return fetch('/api/scan', { method: 'POST', body: fd })
                .then(function (resp) {
                    return resp.json().then(function (body) {
                        if (!resp.ok) throw new Error(body.error || 'Server error ' + resp.status);
                        return body;
                    });
                });
        }

        /* ── Barcode detection ── */
        function startBarcodeScan() {
            if ('BarcodeDetector' in window) {
                startNativeScanner();
            } else {
                startQuaggaScanner();
            }
        }

        /* Native path (Chrome / Edge) */
        function startNativeScanner() {
            if (!detector) {
                detector = new BarcodeDetector({
                    formats: ['code_128', 'qr_code', 'pdf417', 'code_39', 'code_93']
                });
            }
            scannerMode = 'native';
            barcodeStatusEl.textContent = 'Searching for barcode...';
            barcodeStatusEl.style.color = '';
            barcodeStatusEl.hidden = false;
            scanLoop();
        }

        function scanLoop() {
            if (!cameraActive) return;
            detector.detect(video)
                .then(function (barcodes) {
                    if (!cameraActive) return;
                    if (barcodes.length > 0) {
                        barcodeStatusEl.textContent = 'Barcode detected: ' + barcodes[0].rawValue;
                        barcodeStatusEl.style.color = 'green';
                    } else {
                        barcodeStatusEl.textContent = 'Searching for barcode...';
                        barcodeStatusEl.style.color = '';
                    }
                })
                .catch(function () {})
                .then(function () {
                    if (cameraActive) requestAnimationFrame(scanLoop);
                });
        }

        /* Quagga2 path (Safari and browsers without BarcodeDetector) */
        function startQuaggaScanner() {
            if (typeof Quagga === 'undefined') {
                barcodeStatusEl.textContent = 'Barcode detection unavailable';
                barcodeStatusEl.hidden = false;
                return;
            }
            scannerMode = 'quagga';
            barcodeStatusEl.textContent = 'Searching for barcode...';
            barcodeStatusEl.style.color = '';
            barcodeStatusEl.hidden = false;
            quaggaScanLoop();
        }

        function quaggaScanLoop() {
            if (scannerMode !== 'quagga') return;
            if (!video.videoWidth) {
                requestAnimationFrame(quaggaScanLoop);
                return;
            }
            _quaggaCanvas.width  = video.videoWidth;
            _quaggaCanvas.height = video.videoHeight;
            _quaggaCanvas.getContext('2d').drawImage(video, 0, 0);
            Quagga.decodeSingle({
                src: _quaggaCanvas.toDataURL('image/jpeg', 0.8),
                numOfWorkers: 0,
                inputStream: { size: 800 },
                decoder: {
                    readers: [
                        'code_128_reader', 'upc_reader', 'upc_e_reader',
                        'code_39_reader',  'i2of5_reader'
                    ]
                },
                locate: true
            }, function (result) {
                if (scannerMode !== 'quagga') return;
                if (result && result.codeResult && result.codeResult.code) {
                    barcodeStatusEl.textContent = 'Barcode detected: ' + result.codeResult.code;
                    barcodeStatusEl.style.color = 'green';
                    clearTimeout(quaggaDetectTimeout);
                    quaggaDetectTimeout = setTimeout(function () {
                        if (scannerMode === 'quagga') {
                            barcodeStatusEl.textContent = 'Searching for barcode...';
                            barcodeStatusEl.style.color = '';
                        }
                    }, 1500);
                }
                requestAnimationFrame(quaggaScanLoop);
            });
        }

        function stopBarcodeScan() {
            clearTimeout(quaggaDetectTimeout);
            scannerMode = null;
            cameraActive = false;
            barcodeStatusEl.textContent = '';
            barcodeStatusEl.hidden = true;
        }

        /* ── Camera device list ── */
        function populateDevices(activeDeviceId) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
            navigator.mediaDevices.enumerateDevices().then(function (devices) {
                var videoDevices = devices.filter(function (d) { return d.kind === 'videoinput'; });
                camSelect.innerHTML = '';
                videoDevices.forEach(function (d, i) {
                    var opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.textContent = d.label || ('Camera ' + (i + 1));
                    if (d.deviceId === activeDeviceId) opt.selected = true;
                    camSelect.appendChild(opt);
                });
            }).catch(function () {});
        }

        /* ── Start camera ── */
        function startCamera(deviceId) {
            stopBarcodeScan();
            if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }

            statusEl.textContent = 'Connecting to camera…';

            var constraints = deviceId
                ? { video: { deviceId: { exact: deviceId } } }
                : { video: { facingMode: { ideal: 'environment' } } };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function (s) {
                    stream = s;
                    video.srcObject = s;
                    video.hidden = false;
                    statusEl.textContent = 'Camera ready';
                    captureBtn.disabled = false;
                    toggleCameraBtn.textContent = 'Stop Camera';

                    var track = s.getVideoTracks()[0];
                    var activeId = track && track.getSettings ? track.getSettings().deviceId : '';
                    populateDevices(activeId || '');
                    cameraActive = true;
                    startBarcodeScan();
                })
                .catch(function () {
                    statusEl.textContent = 'No camera detected';
                    captureBtn.disabled = true;
                    toggleCameraBtn.textContent = 'Start Camera';
                    video.hidden = true;
                });
        }

        /* ── Stop camera ── */
        function stopCamera() {
            stopBarcodeScan();
            if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }
            video.srcObject = null;
            video.hidden = true;
            captureBtn.disabled = true;
            statusEl.textContent = '';
            toggleCameraBtn.textContent = 'Start Camera';
        }

        /* ── Toggle camera button ── */
        toggleCameraBtn.addEventListener('click', function () {
            if (stream) { stopCamera(); } else { startCamera(camSelect.value || null); }
        });

        /* ── Device picker ── */
        camSelect.addEventListener('change', function () {
            if (camSelect.value) startCamera(camSelect.value);
        });

        /* ── Capture button ── */
        captureBtn.addEventListener('click', function () {
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            captureBtn.disabled = true;
            statusEl.textContent = 'Scanning…';

            canvas.toBlob(function (blob) {
                postImage(blob, 'capture.jpg')
                    .then(function (data) {
                        showResults(data);
                        statusEl.textContent = 'Done';
                        captureBtn.disabled = false;
                    })
                    .catch(function (err) {
                        showError('Scan error: ' + err.message);
                        statusEl.textContent = 'Camera ready';
                        captureBtn.disabled = false;
                    });
            }, 'image/jpeg', 0.92);
        });

        /* ── File upload button ── */
        uploadBtn.addEventListener('click', function () {
            var file = fileInput.files[0];
            if (!file) { showError('Please select an image file first.'); return; }
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading…';

            postImage(file, file.name)
                .then(function (data) {
                    showResults(data);
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'Upload';
                })
                .catch(function (err) {
                    showError('Upload error: ' + err.message);
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'Upload';
                });
        });

        /* ── Annotation submit ── */
        annotateBtn.addEventListener('click', function () {
            if (!currentLabelId) return;

            var payload = {};
            Object.keys(_annotateInputs).forEach(function (field) {
                payload[field] = _annotateInputs[field].value;
            });

            annotateBtn.disabled = true;
            annotateStatus.textContent = 'Saving…';
            annotateStatus.className = 'annotate-status';

            fetch('/labels/' + currentLabelId + '/correct', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
            .then(function (resp) {
                return resp.json().then(function (body) {
                    if (!resp.ok) throw new Error(body.error || 'Server error ' + resp.status);
                    return body;
                });
            })
            .then(function (saved) {
                var gt = saved.ground_truth || {};
                Object.keys(_annotateInputs).forEach(function (field) {
                    if (gt[field] != null) _annotateInputs[field].value = gt[field];
                });
                annotateStatus.textContent = 'Saved';
                annotateStatus.className = 'annotate-status ok';
            })
            .catch(function (err) {
                annotateStatus.textContent = 'Error: ' + err.message;
                annotateStatus.className = 'annotate-status err';
            })
            .then(function () {
                annotateBtn.disabled = false;
            });
        });

        /* ── Auto-start camera on page load ── */
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            startCamera(null);
        } else {
            statusEl.textContent = 'No camera detected';
            toggleCameraBtn.textContent = 'Start Camera';
        }

        if (!('BarcodeDetector' in window) && typeof Quagga === 'undefined') {
            barcodeStatusEl.textContent = 'Live barcode detection not supported in this browser';
            barcodeStatusEl.hidden = false;
        }
    }());
    </script>
</body>
</html>
